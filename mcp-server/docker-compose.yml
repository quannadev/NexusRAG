version: '3.8'

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexusrag-mcp-server-standalone
    environment:
      # Direct connection to the backend if running elsewhere, e.g., http://host.docker.internal:8080/api/v1
      - API_BASE_URL=${API_BASE_URL:-http://host.docker.internal:8080/api/v1}
      - TRANSPORT=http
      - PORT=8000
    ports:
      - "8000:8000"
    restart: unless-stopped
