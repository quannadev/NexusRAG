# NexusRAG — Full Stack (Production)
# Usage: cp .env.example .env && docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexusrag-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexusrag
    ports:
      - "5433:5432"
    volumes:
      - nexusrag_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nexusrag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # MinIO Console UI
    volumes:
      - nexusrag_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: nexusrag-chromadb
    ports:
      - "8002:8000"
    volumes:
      - nexusrag_chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nexusrag-backend
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      # Override for Docker internal networking
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nexusrag
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      # S3 / MinIO — internal Docker hostname
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_DOCUMENTS: nexusrag-documents
      S3_BUCKET_IMAGES: nexusrag-images
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: nexusrag-mcp-server
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_BASE_URL: http://backend:8080/api/v1
      TRANSPORT: http
      PORT: "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nexusrag-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5174:80"
    restart: unless-stopped

volumes:
  nexusrag_postgres_data:
  nexusrag_chroma_data:
  nexusrag_minio_data:
